{% extends "base.html" %}
{% set active_page = "compress" %}

{% block title %}Compress - CompressIt{% endblock %}

{% block content %}
<h1 class="page-title">Compress Files</h1>
<p class="page-subtitle">Drop your images and videos to compress them instantly.</p>

<div class="card">
  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/compress" enctype="multipart/form-data">
    <label>Files</label>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="files" name="files" accept="image/*,video/*" multiple required>
      <div class="icon">&#128230;</div>
      <div class="label">Drag &amp; drop files here or <strong>browse</strong></div>
      <div class="file-list" id="file-list"></div>
    </div>

    <label>Quality</label>
    <div class="quality-row">
      <input type="range" id="quality" name="quality" min="1" max="100" value="60"
             oninput="document.getElementById('qval').textContent=this.value">
      <span class="quality-val" id="qval">70</span>
    </div>

    <button type="submit" class="btn-primary">Compress</button>
  </form>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const filesInput = document.getElementById('files');
  const fileList = document.getElementById('file-list');

  ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
  dropZone.addEventListener('drop', ev => { filesInput.files = ev.dataTransfer.files; showFileList(); });
  filesInput.addEventListener('change', showFileList);

  function showFileList() {
    fileList.innerHTML = '';
    for (const f of filesInput.files) {
      const d = document.createElement('div');
      const kb = f.size < 1048576 ? (f.size / 1024).toFixed(1) + ' KB' : (f.size / 1048576).toFixed(1) + ' MB';
      d.textContent = f.name + ' (' + kb + ')';
      fileList.appendChild(d);
    }
  }
</script>
{% endblock %}
