services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - media:/app/media
      - db:/app/db
    environment:
      - DB_DIR=/app/db
    depends_on:
      - worker

  worker:
    build: .
    command: uv run celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - media:/app/media
      - db:/app/db
    environment:
      - DB_DIR=/app/db

volumes:
  media:
  db:
